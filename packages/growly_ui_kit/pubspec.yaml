name: growly_ui_kit
description: UI Kit for Growly - reusable widgets, themes, and components.
version: 1.0.0+1

publish_to: 'none'

resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Icons & UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0

  # Animations
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
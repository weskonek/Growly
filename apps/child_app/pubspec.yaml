name: child_app
description: Growly - Child App, safe launcher dan AI tutor untuk anak.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Monorepo packages
  growly_core:
    path: ../../packages/growly_core
  growly_ui_kit:
    path: ../../packages/growly_ui_kit
  growly_ai_tutor:
    path: ../../packages/growly_ai_tutor
  growly_parental_control:
    path: ../../packages/growly_parental_control

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.0

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2
  lottie: ^3.1.2
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0

  # Notifications
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/content/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800

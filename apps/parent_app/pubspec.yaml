name: parent_app
description: Growly - Parent App untuk mengatur family, parental control, dan melihat progress anak.

publish_to: 'none'
version: 1.0.0+1

resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Monorepo packages
  growly_core:
    path: ../../packages/growly_core
  growly_ui_kit:
    path: ../../packages/growly_ui_kit

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.0

  # Utilities
  flutter_dotenv: ^5.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.0
  qr_flutter: ^4.1.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  dio: ^5.6.0
  uuid: ^4.4.0
  device_info_plus: ^10.1.0

  # Notifications (Firebase removed — FCM not yet implemented)
  flutter_local_notifications: ^17.2.2

  # Payment
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - .env
  # assets:
  #   - assets/images/
  #   - assets/animations/
  #   - assets/icons/

name: growly

packages:
  - apps/parent_app
  - apps/child_app
  - packages/growly_core
  - packages/growly_ui_kit
  - packages/growly_ai_tutor
  - packages/growly_parental_control

scripts:
  analyze:
    run: melos exec -- flutter analyze
    description: Analyze all packages

  test:
    run: melos exec -- flutter test
    description: Run tests on all packages

  format:
    run: melos exec -- dart format .
    description: Format all packages

  clean:
    run: melos exec -- flutter clean
    description: Clean all packages

  build:android:parent:
    run: cd apps/parent_app && flutter build apk --release
    description: Build parent app for Android

  build:android:child:
    run: cd apps/child_app && flutter build apk --release
    description: Build child app for Android

ide:
  intellij: true

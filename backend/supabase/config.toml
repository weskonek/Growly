# ============================================
# Supabase CLI Configuration
# ============================================

[project]
# Your Supabase project reference (found in dashboard URL)
project_id = "scfgcegyvgkxntqmmerl"

# Project description
description = "Growly - AI-Powered Digital Growth Platform for Kids"

# ============================================
# API Configuration
# ============================================
[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ============================================
# Database Configuration
# ============================================
[db]
port = 54322
# Shadow database port (for migrations)
shadow_port = 54320
major_version = 15

# ============================================
# Studio Configuration
# ============================================
[studio]
enabled = true
port = 54323
# API URL for studio
api_url = "http://127.0.0.1"

# ============================================
# Inbucket Configuration (Email testing)
# ============================================
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

# ============================================
# Realtime Configuration
# ============================================
[realtime]
enabled = true
ip_version = "ipv4"
# Max connections per tenant
max_header_length = 4096

# ============================================
# Storage Configuration
# ============================================
[storage]
enabled = true
file_size_limit = "50MiB"

# ============================================
# Auth Configuration
# ============================================
[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

# Email auth settings
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# SMS auth (optional)
# [auth.sms]
# enable_signup = false

# ============================================
# Edge Functions Configuration
# ============================================
[edge_runtime]
enabled = true
# Timeout in seconds
timeout_seconds = 60

# ============================================
# Analytics Configuration
# ============================================
[analytics]
enabled = true
port = 54327
# Backend endpoint
backend = "postgres://postgres:postgres@127.0.0.1:54322/postgres"

# ============================================
# Logging
# ============================================
[log_levels]
api = "info"
db = "info"
auth = "info"
realtime = "info"
storage = "info"
edge_runtime = "info"
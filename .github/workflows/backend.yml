name: Backend Deploy

on:
  push:
    branches:
      - main
      - develop
    paths:
      - backend/**
      - .github/workflows/backend.yml

  pull_request:
    branches:
      - main
      - develop
    paths:
      - backend/**

env:
  SUPABASE_PROJECT_REF_DEV: scfgcegyvgkxntqmmerl
  SUPABASE_PROJECT_REF_PROD: ${{ vars.SUPABASE_PROJECT_REF_PROD }}

jobs:
  lint:
    name: Lint SQL Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check SQL syntax
        run: |
          for file in backend/supabase/migrations/*.sql; do
            echo "Checking $file..."
            if grep -q "DROP TABLE.*CASCADE" "$file"; then
              echo "WARNING: DROP TABLE CASCADE found in $file"
            fi
          done

  migrate-dev:
    name: Migrate Dev Database
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/develop'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        run: npm install -g supabase
      - name: Link to Dev Project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF_DEV }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_DEV }}
      - name: Apply Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_DEV }}

  migrate-production:
    name: Migrate Production Database
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        run: npm install -g supabase
      - name: Link to Production Project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF_PROD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}
      - name: Apply Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}

  deploy-functions-dev:
    name: Deploy Edge Functions Dev
    runs-on: ubuntu-latest
    needs: migrate-dev
    if: github.ref == 'refs/heads/develop'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        run: npm install -g supabase
      - name: Link to Dev Project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF_DEV }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_DEV }}
      - name: Deploy AI Tutor Function
        run: |
          supabase secrets set GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY_DEV }}
          supabase functions deploy ai-tutor --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_DEV }}

  deploy-functions-production:
    name: Deploy Edge Functions Production
    runs-on: ubuntu-latest
    needs: migrate-production
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        run: npm install -g supabase
      - name: Link to Production Project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF_PROD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}
      - name: Deploy AI Tutor Function
        run: |
          supabase secrets set GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY_PROD }}
          supabase functions deploy ai-tutor --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}

  test-edge-function:
    name: Test Edge Function
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Type Check AI Tutor
        run: |
          cd backend/supabase/functions/ai-tutor
          deno check index.ts